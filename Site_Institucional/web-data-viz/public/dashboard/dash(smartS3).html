<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="shortcut icon" href="../Imagens/SmartGreen_Logo_with_Greenhouse_and_Tomato_Icon-removebg-preview.png" type="image/x-icon">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartGreen | Dashboards</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styleDashS3.css">
  <script src="../js/sessao.js"></script>
  <script src="./../js/alerta.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="janela">

    <div class="header-left">
      <h1>SmartGreen</h1>
      <div class="hello">
        <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
      </div>
      <div class="btn-nav-white">
        <a href="cards(smartS3).html"><h3>Estufas</h3></a>
      </div>
      <div class="btn-nav">
        <h3>Gráficos</h3>
      </div>
      <div class="btn-nav-white">
        <a href="./mural.html"><h3>Manual do Cliente</h3></a>
      </div>
      <div class="btn-logout" onclick="limparSessao()">
        <h3>Sair</h3>
      </div>
    </div>

    <div class="dash">
      <div id="alerta"></div>
      <div class="btns-dash" id="btnAquario"></div>
      <div id="graficos"></div>
    </div>

  </div>
</body>

<script>
  b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

  let proximaAtualizacao = {};

  window.onload = exibirEstufasDoUsuario();

  function exibirEstufasDoUsuario() {
    var estufas = JSON.parse(sessionStorage.ESTUFAS);
    estufas.forEach(item => {
      document.getElementById("btnAquario").innerHTML += `
        <button class="btn-chart" onclick="exibirEstufa(${item.idEstufa})" id="btnAquario${item.idEstufa}">${item.nomeEstufa}</button>
      `;
      document.getElementById("graficos").innerHTML += `
        <div id="grafico${item.idEstufa}" class="display-none">
          <h3 class="tituloGraficos">
            <span id="tituloEstufa${item.idEstufa}">${item.nomeEstufa}</span>
          </h3>
          <div class="graph">
            <canvas id="myChartCanvas${item.idEstufa}"></canvas>
          </div>
          <div class="label-captura">
            <p id="avisoCaptura${item.idEstufa}"></p>
          </div>
        </div>
      `;
      obterDadosGrafico(item.idEstufa);
    });
    if (estufas.length > 0) {
      exibirEstufa(estufas[0].idEstufa);
    }
  }

  function alterarTitulo(idEstufa) {
    var tituloEstufa = document.getElementById(`tituloEstufa${idEstufa}`);
    var nomeEstufa = JSON.parse(sessionStorage.ESTUFAS).find(item => item.idEstufa == idEstufa).nomeEstufa;
    tituloEstufa.innerHTML = "Últimas medidas de Temperatura e Umidade — <span style='color:#4a8c3f'>" + nomeEstufa + "</span>";
  }

  function exibirEstufa(idEstufa) {
    let todosOsGraficos = JSON.parse(sessionStorage.ESTUFAS);
    for (i = 0; i < todosOsGraficos.length; i++) {
      if (todosOsGraficos[i].idEstufa != idEstufa) {
        let elementoAtual = document.getElementById(`grafico${todosOsGraficos[i].idEstufa}`);
        if (elementoAtual.classList.contains("display-block")) elementoAtual.classList.remove("display-block");
        elementoAtual.classList.add("display-none");
        let btnAtual = document.getElementById(`btnAquario${todosOsGraficos[i].idEstufa}`);
        if (btnAtual.classList.contains("btn-pink")) btnAtual.classList.remove("btn-pink");
        btnAtual.classList.add("btn-white");
      }
    }
    let graficoExibir = document.getElementById(`grafico${idEstufa}`);
    graficoExibir.classList.remove("display-none");
    graficoExibir.classList.add("display-block");
    let btnExibir = document.getElementById(`btnAquario${idEstufa}`);
    btnExibir.classList.remove("btn-white");
    btnExibir.classList.add("btn-pink");
  }

  function obterDadosGrafico(idEstufa) {
    alterarTitulo(idEstufa);
    if (proximaAtualizacao[idEstufa]) clearTimeout(proximaAtualizacao[idEstufa]);
    fetch(`/medidas/ultimas/${idEstufa}`, { cache: 'no-store' }).then(function (response) {
      if (response.ok) {
        response.json().then(function (resposta) {
          console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
          resposta.reverse();
          plotarGrafico(resposta, idEstufa);
        });
      } else {
        console.error('Nenhum dado encontrado ou erro na API');
      }
    }).catch(function (error) {
      console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
    });
  }

  function plotarGrafico(resposta, idEstufa) {
    console.log('iniciando plotagem do gráfico...');
    let labels = [];
    let dados = {
      labels: labels,
      datasets: [{
        label: 'Umidade',
        data: [],
        fill: false,
        borderColor: 'rgb(75, 192, 192)',
        tension: 0.1
      }, {
        label: 'Temperatura',
        data: [],
        fill: false,
        borderColor: 'rgb(199, 52, 52)',
        tension: 0.1
      }]
    };
    for (i = 0; i < resposta.length; i++) {
      var registro = resposta[i];
      labels.push(registro.momento_grafico);
      dados.datasets[0].data.push(registro.umidade);
      dados.datasets[1].data.push(registro.temperatura);
    }
    const config = { type: 'line', data: dados };
    let myChart = new Chart(document.getElementById(`myChartCanvas${idEstufa}`), config);
    setTimeout(() => atualizarGrafico(idEstufa, dados, myChart), 2000);
  }

  function atualizarGrafico(idEstufa, dados, myChart) {
    fetch(`/medidas/tempo-real/${idEstufa}`, { cache: 'no-store' }).then(function (response) {
      if (response.ok) {
        response.json().then(function (novoRegistro) {
          obterdados(idEstufa);
          console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
          let avisoCaptura = document.getElementById(`avisoCaptura${idEstufa}`);
          avisoCaptura.innerHTML = "";
          if (novoRegistro[0].momento_grafico == dados.labels[dados.labels.length - 1]) {
            avisoCaptura.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> Foi trazido o dado mais atual capturado pelo sensor. Como não há dados novos a exibir, o gráfico não atualizará.";
          } else {
            dados.labels.shift();
            dados.labels.push(novoRegistro[0].momento_grafico);
            dados.datasets[0].data.shift();
            dados.datasets[0].data.push(novoRegistro[0].umidade);
            dados.datasets[1].data.shift();
            dados.datasets[1].data.push(novoRegistro[0].temperatura);
            myChart.update();
          }
          proximaAtualizacao[idEstufa] = setTimeout(() => atualizarGrafico(idEstufa, dados, myChart), 2000);
        });
      } else {
        console.error('Nenhum dado encontrado ou erro na API');
        proximaAtualizacao[idEstufa] = setTimeout(() => atualizarGrafico(idEstufa, dados, myChart), 2000);
      }
    }).catch(function (error) {
      console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
    });
  }
</script>
</html>
