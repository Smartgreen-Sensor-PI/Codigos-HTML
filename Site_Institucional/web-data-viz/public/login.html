<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./../css/style.css">
  <title>Login - SmartGreen🍀</title>
  <script src="./js/sessao.js"></script>
  <link rel="shortcut icon" type="image/x-icon" href="./Imagens/aba.png">
</head>

<body class="home">

  <header>
    <nav>
      <div class="menu-esquerda">
        <a href="./../index.html">🍀</a>
        <a href="./../index.html#sobre">Sobre nós</a>
        <a href="./../index.html#produtos">Produtos</a>
        <a href="./../index.html#missao">Nossa missão</a>
        <a href="./../calculeseuprejuízo.html">Calcule seu prejuízo</a>
      </div>
      <div class="menu-direita">
        <a href="./../login.html">👤</a>
      </div>
    </nav>
  </header>

  <div class="tela">
    <div class="caixa-login">
      <h1 style="font-size: 28px; color: #34492a;">Seja bem-vindo a <br>SmartGreen🍀</h1>

      <div class="input-group">
        <b>Digite seu usuário:</b>
        <input class="inputs" type="text" id="ipt_login" placeholder="Seu usuário">
        <span id="validacao_usuario" class="msg_validacao"></span>
      </div>

      <div class="input-group">
        <b>Digite sua senha:</b>
        <input class="inputs" type="password" id="ipt_senha" placeholder="Sua senha">
        <span id="validacao_senha" class="msg_validacao"></span>
      </div>

      <p style="font-size: 14px;">
        Não possui cadastro? <a href="./../cadastro.html" style="color: #34492a; font-weight: bold;">Clique aqui</a>
      </p>

      <button class="btn-verde" onclick="entrar()">Entrar</button>
    </div>
    <div id="div_erros_login"></div>
  </div>

  <footer class="rodape">
    <p>© 2026 SmartGreen🍀 - Todos os direitos reservados</p>
    <p>Contato: smartgreen@email.com</p>
  </footer>

  <script>
    function entrar() {
      aguardar()

      let email = document.getElementById('ipt_email').value
      let senha = document.getElementById('ipt_senha').value

      validacao_email.style.display = 'none'
      validacao_senha.style.display = 'none'

      if (email == '') {
        validacao_email.innerHTML = `Por favor, insira seu email`
        validacao_email.style.display = `block`
      }
      if (senha == '') {
        validacao_senha.innerHTML = `Por favor insira sua senha`
        validacao_senha.style.display = `block`
        finalizarAguardar();
        return
      }

      if (email == "fernanda@fernada.com" && senha == "12345678") {
        alert('Seja bem-vindo!')
        window.location.href = "../Graficos/suporte.html"
      } else if (email != "fernanda@fernada.com" && senha != "12345678") {
        window.location.href = "../Graficos/dashboard.html"
      } else {
        alert('Usuário ou senha incorretos')

      }

      console.log("FORM LOGIN: ", email);
        console.log("FORM SENHA: ", senha);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    
    }
  </script>

</body>

</html>
