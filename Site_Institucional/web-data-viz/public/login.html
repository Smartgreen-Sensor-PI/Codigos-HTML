<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SmartGreen</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/logcad.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="css/Imagens/SmartGreen_Logo_with_Greenhouse_and_Tomato_Icon-removebg-preview-removebg-preview (1).png" alt="Logo" class="logo-img">
      <a href="index.html">SmartGreen Sensor</a>
    </div>
    <nav class="menu">
      <a href="index.html#home">Início</a>
      <a href="index.html#sobre">Sobre nós</a>
      <a href="index.html#como-funciona">Como funciona</a>
      <a href="index.html#produtos">Produto</a>
      <a href="index.html#missao">Missão</a>
      <a href="calculeseuprejuízo.html">Calcule seu prejuízo</a>
    </nav>
    <a href="login.html" class="btn-login">Login</a>
  </header>

  <div class="caixa-login">

    <h1>Realize seu login! 🍅</h1>
    <div class="input-group">
      <b>Digite seu usuário:</b>
      <input class="inputs" type="text" id="ipt_login" placeholder="Seu usuário">
      <span id="validacao_usuario" class="msg_validacao"></span>
    </div>

    <div class="input-group">
      <b>Digite sua senha:</b>
      <input class="inputs" type="password" id="ipt_senha" placeholder="Sua senha">
      <span id="validacao_senha" class="msg_validacao"></span>
    </div>
    <p>Não possui cadastro? <a href="cadastro.html">Clique aqui</a></p>

    <button class="btn-verde" onclick="entrar()">Entrar</button>
  </div>

</body>
<script>
  function entrar() {
    let login = document.getElementById('ipt_login').value
    let senha = document.getElementById('ipt_senha').value

    validacao_usuario.style.display = 'none'
    validacao_senha.style.display = 'none'

    if (login == '') {
      validacao_usuario.innerHTML = `Por favor, insira seu usuário`
      validacao_usuario.style.display = `block`
    }
    if (senha == '') {
      validacao_senha.innerHTML = `Por favor insira sua senha`
      validacao_senha.style.display = `block`
    }
    console.log("FORM LOGIN: ", login);
    console.log("FORM SENHA: ", senha);

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: login,
        senhaServer: senha
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()!")

      if (resposta.ok) {
        console.log(resposta);

        resposta.json().then(json => {
          console.log(json);
          console.log(JSON.stringify(json));
          sessionStorage.EMAIL_USUARIO = json.email;
          sessionStorage.NOME_USUARIO = json.nome;
          sessionStorage.ID_USUARIO = json.id;
          sessionStorage.FK_EMPRESA = json.fkEmpresa;
          fetch(`/estufas/${json.fkEmpresa}`)
            .then(res => res.json())
            .then(estufas => {

              console.log("Estufas encontradas:", estufas);

              sessionStorage.ESTUFAS = JSON.stringify(estufas);

              if (login == "fernanda@empresa.com" && senha == "12345678!") {
            window.location.href = "http://localhost:3000"
          } else {

              window.location = "./dashboard/cards(smartS3).html"};

            })
            .catch(erro => {
              console.error("Erro ao buscar estufas:", erro);
            });

        });

      } else {

        console.log("Houve um erro ao tentar realizar o login!");
        resposta.text().then(texto => {validacao_senha.innerHTML = texto; validacao_senha.style.display = "block";

        console.error(texto);
        });
      }

    }).catch(function (erro) {
      console.log(erro);
    })

    return false;

  }
</script>
</html>
