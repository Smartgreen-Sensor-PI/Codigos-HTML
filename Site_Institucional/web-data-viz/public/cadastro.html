<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - SmartGreen</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/logcad.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="css/Imagens/SmartGreen_Logo_with_Greenhouse_and_Tomato_Icon-removebg-preview-removebg-preview (1).png" alt="Logo" class="logo-img">
      <a href="index.html">SmartGreen Sensor</a>
    </div>
    <nav class="menu">
      <a href="index.html#home">Início</a>
      <a href="index.html#sobre">Sobre nós</a>
      <a href="index.html#como-funciona">Funcionamento</a>
      <a href="index.html#produtos">Produto</a>
      <a href="index.html#missao">Missão</a>
      <a href="calculeseuprejuízo.html">Calcule seu prejuízo</a>
    </nav>
    <a href="login.html" class="btn-login">Login</a>
  </header>

  <div class="caixa-cadastro">
    <h1>Olá! Realize seu cadastro 🍅</h1>

    <div class="input-group">
      <b>Código da empresa:</b>
      <input class="inputs" type="text" id="ipt_codigoEmpresa" placeholder="Ex: TOP123">
      <span id="validacao_codigo" class="msg_validacao"></span>
    </div>

    <div class="input-group">
      <b>Digite seu nome:</b>
      <input class="inputs" type="text" id="ipt_nome" placeholder="Seu nome">
      <span id="validacao_usuario" class="msg_validacao"></span>
    </div>

    <div class="input-group">
      <b>Digite seu e-mail:</b>
      <input class="inputs" type="email" id="ipt_email" placeholder="Seu e-mail">
      <span id="validacao_email" class="msg_validacao"></span>
    </div>

    <div class="input-group">
      <b>Digite sua senha:</b>
      <input class="inputs" type="password" id="ipt_senha" placeholder="Sua senha">
      <span id="validacao_senha" class="msg_validacao"></span>
    </div>

    <div class="input-group">
      <b>Confirme a sua senha:</b>
      <input class="inputs" type="password" id="ipt_senhaConf" placeholder="Confirme a senha">
      <span id="validacao_confSenha" class="msg_validacao"></span>
    </div>

    <button class="btn-verde" onclick="cadastrar()">Cadastrar</button>
  </div>

</body>
<script>
  function cadastrar() {
    var nome = document.getElementById('ipt_nome').value
    var email = document.getElementById('ipt_email').value
    var senha = document.getElementById('ipt_senha').value
    var senhaConfirmada = document.getElementById('ipt_senhaConf').value
    var codigoEmpresa = document.getElementById('ipt_codigoEmpresa').value

    validacao_usuario.style.display = 'none'
    validacao_email.style.display = 'none'
    validacao_senha.style.display = 'none'
    validacao_confSenha.style.display = 'none'

    if (nome == '') { validacao_usuario.innerHTML = `O campo de usuário deve ser preenchido`; validacao_usuario.style.display = 'block'; return }
    if (email == '') { validacao_email.innerHTML = `O campo de Email deve ser preenchido`; validacao_email.style.display = 'block'; return }
    if (email.indexOf('@') < 0) { validacao_email.innerHTML = `Insira um email válido`; validacao_email.style.display = 'block'; return }
    if (senha == '') { validacao_senha.innerHTML = `O campo de senha deve ser preenchido`; validacao_senha.style.display = 'block'; return }
    if (senhaConfirmada != senha) { validacao_confSenha.innerHTML = `As senhas não coincidem`; validacao_confSenha.style.display = 'block'; return }
    if (senha.length < 8) { validacao_confSenha.innerHTML = `Senha muito curta! Mínimo de 8 caracteres`; validacao_confSenha.style.display = 'block'; return }
    if (codigoEmpresa == '') { validacao_codigo.innerHTML = `Informe o código da empresa`; validacao_codigo.style.display = 'block'; return }

    let qtdNumero = 0
    let caracterEspecial = '!@#$%&*'
    let possuiCaracEspecial = false
    for (let i = 0; i < senha.length; i++) {
      if (senha[i] >= '0' && senha[i] <= '9') { qtdNumero++ }
      else if (caracterEspecial.indexOf(senha[i]) >= 0) { possuiCaracEspecial = true }
    }
    if (qtdNumero < 2) { validacao_senha.innerHTML = `Senha fraca! Insira ao menos 2 números`; validacao_senha.style.display = 'block'; return }
    if (!possuiCaracEspecial) { validacao_senha.innerHTML = `Senha fraca! Insira ao menos 1 caractere especial (!@#$%&*)`; validacao_senha.style.display = 'block'; return }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nomeServer: nome, emailServer: email, senhaServer: senha, senhaConfirmadaServer: senhaConfirmada, codigoEmpresaServer: codigoEmpresa })
    }).then(function (resposta) {
      if (resposta.ok) {
        validacao_confSenha.innerHTML = "Cadastro realizado com sucesso! Redirecionando...";
        validacao_confSenha.style.display = 'block';
        setTimeout(() => { window.location = "./login.html"; }, 2000);
      } else {
        resposta.text().then(texto => { validacao_codigo.innerHTML = texto; validacao_codigo.style.display = "block"; });
      }
    }).catch(function (resposta) { console.log(`#ERRO: ${resposta}`); });
    return false;
  }
</script>
</html>
