<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../Imagens/SmartGreen_Logo_with_Greenhouse_and_Tomato_Icon-removebg-preview.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGreen | Área do Suporte</title>


<link rel="stylesheet" href="css/suporte.css">

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="janela">

        <div class="header-left dash-header">

            <h1>SmartGreen</h1>

            <div class="hello">
                <h3>Área do Suporte</h3>
            </div>

            <div class="btn-nav">
                <h3>Suporte N3</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./assets/Manual Tecnico.pdf" target="_blank">
                    <h3>Manual de Instalação</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div id="container">
        <h1>BobIA</h1>
        <p>A <strong>BobIA</strong> é a nossa inteligência artificial programada exclusivamente para auxiliar e otimizar o atendimento do <strong>Suporte N3</strong> no manejo das estufas.</p><br>
        <textarea id="pergunta" type="text" placeholder="Digite a pergunta..."></textarea>
        <br><br>
        <button onclick="gerarResposta()">Gerar Resposta</button>
        <h3>Resposta da IA:</h3>
        <div id="resposta"></div>
    </div>

</body>


 <script>
        
        async function gerarResposta() {
            const pergunta = document.getElementById('pergunta').value;

            const response = await fetch('/perguntar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ pergunta })
            });

            const data = await response.json();

            resposta.style.display = 'block';
            document.getElementById('resposta').innerText = data.resultado;
        }

        function limparSessao() {
            sessionStorage.clear();
            window.location = "http://localhost:3333/login.html";
}

    </script>
</html>
