<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobIA</title>
    <link rel="stylesheet" href="Suporte.css">

</head>

<body>
    <header>
        <nav class="nav-bar">
            <div class="menu">
                <a href="#home">🍀</a>
                <a href="#sobre">Sobre nós</a>
                <a href="#produtos">Produtos</a>
                <a href="#missao">Nossa missão</a>
                <a href="calculeseuprejuízo.html">Calcule seu prejuízo</a>
            </div>
            <div class="logo_login">
                <a href="login.html">👤</a>
            </div>
        </nav>
    </header>
    <section class="suporte">
        <div class="titulo_suporte">
            <h3>Suporte</h3>
        </div>
        <div class="texto_suporte">Área destinada ao suporte para o serviço de clientes.</div>
    </section>

    <section class="bob_ia">
        <div id="container">
            <h1>BobIA</h1>
            <textarea id="pergunta" type="text" placeholder="Digite a pergunta..."></textarea>
            <br><br>
            <button onclick="gerarResposta()">Gerar Resposta</button>
            <h3>Resposta da IA:</h3>
            <div id="resposta"></div>
        </div>
    </section>

    <script>

        async function gerarResposta() {
            const pergunta = document.getElementById('pergunta').value;

            const response = await fetch('/perguntar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ pergunta })
            });

            const data = await response.json();

            resposta.style.display = 'block';
            document.getElementById('resposta').innerText = data.resultado;
        }

    </script>

</body>

</html>
